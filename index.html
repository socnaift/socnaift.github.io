<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeCookie Server</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <div class="logo">🟢 LifeCookie MC</div>

  <nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('news')">News</button>
    <button onclick="showSection('support')">Soporte</button>
  </nav>

  <button class="login-btn" onclick="openLogin()">Login</button>
</header>

<!-- SECCIONES -->
<main>

  <section id="home" class="section active">
    <h1>🔥 Bienvenido al Server</h1>
    <p>Tu servidor oficial de Minecraft</p>
    <div class="ip">IP: tu-ip-aqui</div>
  </section>

  <section id="news" class="section">
    <h1>📰 Noticias</h1>
    <p>Aquí aparecerán las noticias del servidor.</p>
  </section>

  <section id="support" class="section">
    <h1>❓ Soporte</h1>
    <p>Información de ayuda y contacto.</p>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
